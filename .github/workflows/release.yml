name: sonar-release

on:
  workflow_dispatch:
    inputs:
      version:
        type: string
        description: Version
        required: true
      dryRun:
        type: boolean
        description: Flag to enable the dry-run execution
        default: false
        required: false

jobs:
  release:
    permissions:
      id-token: write
      contents: write
    uses: SonarSource/gh-action_release/.github/workflows/main.yaml@0c9c1cc54cbdd24258f135601d1b77cfc87e67ae # 7.4.0
    with:
      version: ${{ inputs.version }}
      dryRun: ${{ inputs.dryRun }}
      publishToBinaries: false
      mavenCentralSync: true
      # Slack channel squad-devex-private
      slackChannel: C02E6L5C01H
